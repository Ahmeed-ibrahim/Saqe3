    <div class="slider-container">
      <button class="prev"><i class="fa-solid fa-chevron-right"></i></button>

      <div class="slider">
        <div class="slider-track">
          <div class="image-box"><img src="Assets/img/Berries.jpg" /></div>
          <div class="image-box"><img src="Assets/img/chocolate.jpg" /></div>
          <div class="image-box"><img src="Assets/img/Lemon.jpg" /></div>
          <div class="image-box"><img src="Assets/img/Pistachio.jpg" /></div>
          <div class="image-box"><img src="Assets/img/Strawberry.jpg" /></div>
          <div class="image-box"><img src="Assets/img/tot.jpg" /></div>
          <div class="image-box"><img src="Assets/img/Avocado.jpg" /></div>
          <div class="image-box"><img src="Assets/img/mango.jpg" /></div>
        </div>
      </div>

      <button class="next"><i class="fa-solid fa-chevron-left"></i></button>
    </div>

    <script>  // استخدمت ال Ai لحد م ربنا يكرم واتعلم الجافا 4.6.2026
      const slider = document.querySelector(".slider-track");
      const nextBtn = document.querySelector(".next");
      const prevBtn = document.querySelector(".prev");

      // حساب عرض الصورة + الفراغ بينها وبين اللي بعدها
      const getStepWidth = () => {
        const box = document.querySelector(".image-box");
        return box.offsetWidth + 20;
      };

      // زر اليمين (السابق في RTL)
      prevBtn.onclick = () => {
        slider.scrollBy({ left: getStepWidth(), behavior: "smooth" });
      };

      // زر الشمال (التالي في RTL)
      nextBtn.onclick = () => {
        slider.scrollBy({ left: -getStepWidth(), behavior: "smooth" });
      };

      // ميزة السحب بالماوس (Drag to Scroll)
      let isDown = false;
      let startX;
      let scrollLeft;

      slider.addEventListener("mousedown", (e) => {
        isDown = true;
        slider.style.scrollBehavior = "auto"; // تعطيل الـ Smooth أثناء السحب اليدوي
        startX = e.pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;
      });

      slider.addEventListener("mouseleave", () => {
        isDown = false;
      });
      slider.addEventListener("mouseup", () => {
        isDown = false;
        slider.style.scrollBehavior = "smooth";
      });

      slider.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 1.5; // سرعة السحب
        slider.scrollLeft = scrollLeft - walk;
      });
    </script>
